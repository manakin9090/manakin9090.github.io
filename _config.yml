title: "ImX6 공식 블로그"
author: "KIM MINJU"
description: "AI 3D 굿즈 및 주얼리 제작"

# 블로그 주소 설정
url: "https://blog.imagetogoods.com"
baseurl: ""

# 테마 및 플러그인
remote_theme: sighingnow/jekyll-gitbook
plugins:
  - jekyll-remote-theme
  - jekyll-toc
  - jekyll-seo-tag

# 시간 및 발행 설정 (날짜 오류 방지)
timezone: "Asia/Seoul"
future: true

# 사이드바 메뉴 순서 설정
ordered_collections:
  - posts

# 목차 설정
toc:
  enabled: true
  h_min: 1
  h_max: 3

# Markdown 및 하이라이트 설정
kramdown:
  input: GFM
  syntax_highlighter: rouge
